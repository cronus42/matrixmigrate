# MatrixMigrate Configuration Example
# Copy this file to config.yaml and update with your settings

# Language setting (default: en)
# Supported: en, tr
language: en

# Mattermost server configuration
mattermost:
  ssh:
    host: "mattermost.example.com"
    port: 22
    user: "root"
    
    # Authentication: Use ONE of the following options:
    
    # Option 1: SSH Key (recommended)
    key_path: "~/.ssh/id_rsa"
    # passphrase_env: "SSH_KEY_PASSPHRASE"  # Optional: if key is encrypted
    
    # Option 2: Password authentication
    # password_env: "MM_SSH_PASSWORD"  # Env var containing SSH password
  
  # Path to Mattermost config.json on remote server
  # Database credentials will be read from this file automatically!
  config_path: "/opt/mattermost/config/config.json"
  
  # Optional: Manual database override (if you don't want auto-detection)
  # database:
  #   host: "localhost"
  #   port: 5432
  #   name: "mattermost"
  #   user: "mmuser"
  #   password_env: "MM_DB_PASSWORD"
  
  # Export/import 1:1 DM channels (type D) as Matrix DM rooms (default: true)
  # Requires re-export of assets after changing this setting
  include_dms: true

  # File attachment migration settings
  files:
    # Migration mode:
    #   "link"   - Keep S3/public URLs in messages (fastest, requires S3 public access)
    #   "upload" - Download and re-upload files to Matrix (slowest, most portable)
    #   "skip"   - Don't migrate files (fastest, messages only)
    mode: "link"
    
    # S3 public URL prefix for direct linking
    # Files will be accessible at: {s3_public_url}/{file_path}
    # Example: https://s3.example.com/mattermost-bucket
    s3_public_url: "https://s3.example.com/mattermost-bucket"
    
    # Local data path (if using local file storage instead of S3)
    # local_data_path: "/opt/mattermost/data"
    
    # Maximum file size to upload to Matrix (in MB)
    # Files larger than this will be linked instead of uploaded
    # Only applies when mode is "upload"
    max_upload_size_mb: 50

# Matrix Synapse server configuration
matrix:
  ssh:
    host: "matrix.example.com"
    port: 22
    user: "root"
    
    # Authentication: Use ONE of the following options:
    
    # Option 1: SSH Key (recommended)
    key_path: "~/.ssh/id_rsa"
    # passphrase_env: "SSH_KEY_PASSPHRASE"  # Optional: if key is encrypted
    
    # Option 2: Password authentication
    # password_env: "MX_SSH_PASSWORD"  # Env var containing SSH password
  
  api:
    # After SSH tunnel, API will be available at localhost
    base_url: "http://localhost:8008"
    # Synapse API port on the remote server (default: 8008)
    # Change this if Synapse listens on a different port
    port: 8008
    # Optional: Use existing admin token instead of login
    # admin_token_env: "MATRIX_ADMIN_TOKEN"
  
  # Login with admin username/password (recommended)
  # The tool will automatically get an access token
  auth:
    username: "admin"
    password_env: "MATRIX_ADMIN_PASSWORD"
  
  # Your Matrix homeserver domain (e.g., for @user:example.com)
  homeserver: "example.com"
  
  # Rate limiting configuration (adjust if you get too many 429 errors)
  rate_limit:
    # Requests per second (lower = slower but safer, 0 = no limit)
    # Default: 5.0 (200ms between requests)
    requests_per_second: 5.0
    
    # Maximum retries when rate limited (429 error)
    # Default: 5
    max_retries: 5
    
    # Base delay in milliseconds for exponential backoff
    # Actual delay: base_delay * 2^retry_count (e.g., 2s, 4s, 8s, 16s, 32s)
    # Default: 2000 (2 seconds)
    retry_base_delay_ms: 2000
  
  # Application Service configuration (required for message import with timestamps)
  # See appservice-registration.example.yaml for setup instructions
  appservice:
    # Enable Application Service mode for message import
    # This allows importing messages with their original timestamps
    enabled: false
    
    # Environment variable containing the AS token
    # Generate with: openssl rand -hex 32
    as_token_env: "MATRIX_AS_TOKEN"
    
    # Environment variable containing the HS token (optional)
    # hs_token_env: "MATRIX_HS_TOKEN"

# Data storage paths
data:
  assets_dir: "./data/assets"
  mappings_dir: "./data/mappings"
  state_file: "./data/state.json"


# ========================================
# SYNAPSE RATE LIMITING - IMPORTANT!
# ========================================
#
# If you're getting too many 429 (rate limit) errors during migration,
# you can TEMPORARILY loosen limits in Synapse homeserver.yaml.
#
# Do NOT use per_second: 0 AND burst_count: 0 — Synapse treats burst_count 0 as
# "no burst allowance" and rejects almost every request (e.g. rc_login.address 429).
# Use very large numbers instead, then restore defaults after migration.
#
# Example (homeserver.yaml):
#
#   rc_message:
#     per_second: 10000
#     burst_count: 1000000
#   rc_registration:
#     per_second: 10000
#     burst_count: 1000000
#   rc_login:
#     address:
#       per_second: 10000
#       burst_count: 1000000
#     account:
#       per_second: 10000
#       burst_count: 1000000
#     failed_attempts:
#       per_second: 10000
#       burst_count: 1000000
#   rc_admin_redaction:
#     per_second: 10000
#     burst_count: 1000000
#   rc_joins:
#     local:
#       per_second: 10000
#       burst_count: 1000000
#     remote:
#       per_second: 10000
#       burst_count: 1000000
#   rc_invites:
#     per_room:
#       per_second: 10000
#       burst_count: 1000000
#     per_user:
#       per_second: 10000
#       burst_count: 1000000
#
# IMPORTANT: Remember to restart Synapse and re-enable rate limiting
# after the migration is complete for security!
#
# To restart Synapse:
#   systemctl restart matrix-synapse  (or your docker command)
#

